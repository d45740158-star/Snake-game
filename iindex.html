<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Ilon O'yini</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0B0E14;
    --board:#151A24;
    --grid:#1D2330;
    --snake:#4ADE80;
    --snake-head:#22C55E;
    --food:#F2C94C;
    --ink:#F4F1EA;
    --muted:#8A94A6;
    --danger:#E63946;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:radial-gradient(ellipse at 50% 20%, #10141d 0%, var(--bg) 65%);
    font-family:'Rajdhani',sans-serif; color:var(--ink);
    touch-action:none; user-select:none;
  }
  #stage{ position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
  canvas{ display:block; background:var(--board); border-radius:14px; box-shadow:0 0 0 2px #232a3a, 0 20px 60px rgba(0,0,0,0.5); max-width:100%; max-height:100%; }

  .hud{ position:absolute; top:0; left:0; right:0; display:flex; justify-content:space-between; padding:14px 18px; font-family:'Orbitron',sans-serif; pointer-events:none; }
  .chip{ background:rgba(11,14,20,0.72); border:1px solid rgba(74,222,128,0.35); border-radius:10px; padding:8px 14px; backdrop-filter:blur(4px); }
  .label{ font-size:9px; letter-spacing:2px; color:var(--muted); }
  .value{ font-size:19px; font-weight:800; }
  .value.best{ color:var(--food); }

  .overlay{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:rgba(6,8,12,0.88); gap:16px; text-align:center; padding:24px; }
  .overlay h1{ font-family:'Orbitron',sans-serif; font-size:clamp(22px,5vw,38px); margin:0; letter-spacing:2px; }
  .overlay p{ margin:0; color:var(--muted); max-width:420px; font-size:15px; line-height:1.5; }
  .btnrow{ display:flex; gap:12px; flex-wrap:wrap; justify-content:center; margin-top:6px; }
  .btn{
    font-family:'Orbitron',sans-serif; background:linear-gradient(180deg, var(--snake), #2fae63);
    color:#062412; border:none; border-radius:12px; padding:14px 28px; font-weight:800; font-size:16px; letter-spacing:1px;
    cursor:pointer; box-shadow:0 6px 0 #1f7a45, 0 10px 20px rgba(0,0,0,0.4); pointer-events:all;
  }
  .btn[data-diff="medium"]{ background:linear-gradient(180deg, var(--food), #c9a02f); box-shadow:0 6px 0 #8f7420, 0 10px 20px rgba(0,0,0,0.4); color:#241c04; }
  .btn[data-diff="hard"]{ background:linear-gradient(180deg, var(--danger), #b52734); box-shadow:0 6px 0 #7c1b23, 0 10px 20px rgba(0,0,0,0.4); color:#2b0508; }
  .btn:active{ transform:translateY(4px); box-shadow:0 2px 0 #1f7a45; }
  .hidden{ display:none !important; }

  #dpad{ position:absolute; bottom:18px; left:50%; transform:translateX(-50%); display:grid; grid-template-columns:60px 60px 60px; grid-template-rows:60px 60px 60px; gap:6px; pointer-events:all; }
  .dbtn{ background:rgba(28,34,48,0.75); border:1px solid rgba(244,241,234,0.18); border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:24px; color:var(--ink); }
  .dbtn.active{ background:rgba(74,222,128,0.35); border-color:var(--snake); }
  #up{ grid-column:2; grid-row:1; }
  #left{ grid-column:1; grid-row:2; }
  #right{ grid-column:3; grid-row:2; }
  #down{ grid-column:2; grid-row:3; }

  .hint{ position:absolute; top:70px; left:50%; transform:translateX(-50%); font-size:12px; color:var(--muted); letter-spacing:0.5px; pointer-events:none; text-align:center; }
</style>
</head>
<body>
<div id="stage">
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="chip"><div class="label">HISOB</div><div class="value" id="scoreVal">0</div></div>
    <div class="chip" id="pauseChip" style="pointer-events:all; cursor:pointer;"><div class="label">&nbsp;</div><div class="value" id="pauseBtn">⏸ PAUZA</div></div>
    <div class="chip"><div class="label">REKORD</div><div class="value best" id="bestVal">0</div></div>
  </div>
  <div class="hint hidden" id="keyHint">Strelkalar yoki W A S D bilan boshqaring</div>

  <div id="dpad" class="hidden">
    <div class="dbtn" id="up">▲</div>
    <div class="dbtn" id="left">◀</div>
    <div class="dbtn" id="right">▶</div>
    <div class="dbtn" id="down">▼</div>
  </div>

  <div class="overlay" id="startOverlay">
    <h1>🐍 ILON O'YINI</h1>
    <p>Ilonni boshqarib mevalarni yeng, o'sing. Devorga yoki o'z tanangizga urilsangiz — o'yin tugaydi!</p>
    <div class="btnrow">
      <button class="btn" data-diff="easy">OSON</button>
      <button class="btn" data-diff="medium">O'RTACHA</button>
      <button class="btn" data-diff="hard">QIYIN</button>
    </div>
  </div>

  <div class="overlay hidden" id="pauseOverlay">
    <h1>⏸ PAUZA</h1>
    <p>O'yin to'xtatildi. Davom etish uchun tugmani bosing yoki "P" tugmasini bosing.</p>
    <button class="btn" id="resumeBtn">DAVOM ETTIRISH</button>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <h1 id="endTitle">O'YIN TUGADI</h1>
    <p id="endText"></p>
    <div class="btnrow">
      <button class="btn" id="restartBtn">QAYTA O'YNASH</button>
      <button class="btn" data-diff="menu" id="menuBtn" style="background:linear-gradient(180deg,#8A94A6,#5c6472); box-shadow:0 6px 0 #454b56, 0 10px 20px rgba(0,0,0,0.4); color:#12151a;">DARAJANI O'ZGARTIRISH</button>
    </div>
  </div>
</div>

<script>
(function(){
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  const COLS = 20, ROWS = 20;
  let cellSize = 20;

  function resize(){
    const dpr = window.devicePixelRatio || 1;
    const availW = window.innerWidth * 0.92;
    const availH = window.innerHeight * 0.86;
    const size = Math.floor(Math.min(availW, availH));
    cellSize = Math.floor(size / COLS);
    const boardSize = cellSize * COLS;
    canvas.style.width = boardSize + 'px';
    canvas.style.height = boardSize + 'px';
    canvas.width = boardSize * dpr;
    canvas.height = boardSize * dpr;
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const isTouch = ('ontouchstart' in window || navigator.maxTouchPoints > 0);
  if (isTouch) document.getElementById('dpad').classList.remove('hidden');
  else document.getElementById('keyHint').classList.remove('hidden');

  let snake, dir, nextDir, food, score, best, tickMs, acc, lastT, state;
  let difficulty = 'medium';
  const DIFF = {
    easy:   { start: 190, min: 110, dec: 1.8 },
    medium: { start: 160, min: 85,  dec: 2.3 },
    hard:   { start: 125, min: 65,  dec: 3.0 }
  };

  // Best score is kept in memory only for this session.
  let bestMem = 0;

  function reset(){
    const startX = Math.floor(COLS/2), startY = Math.floor(ROWS/2);
    snake = [ {x:startX,y:startY}, {x:startX-1,y:startY}, {x:startX-2,y:startY} ];
    dir = {x:1,y:0};
    nextDir = {x:1,y:0};
    score = 0;
    tickMs = DIFF[difficulty].start;
    acc = 0; lastT = null;
    placeFood();
    updateHUD();
  }

  function placeFood(){
    let attempts = 0;
    while(attempts < 500){
      const fx = Math.floor(Math.random()*COLS);
      const fy = Math.floor(Math.random()*ROWS);
      if (!snake.some(s=>s.x===fx && s.y===fy)){ food = {x:fx,y:fy}; return; }
      attempts++;
    }
    food = {x:0,y:0};
  }

  function updateHUD(){
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('bestVal').textContent = Math.max(best||0, bestMem);
  }

  function setDir(nx,ny){
    // prevent reversing directly into the body
    if (dir.x === -nx && dir.y === -ny) return;
    nextDir = {x:nx,y:ny};
  }

  window.addEventListener('keydown', e=>{
    if (['ArrowUp','w','W'].includes(e.key)) setDir(0,-1);
    else if (['ArrowDown','s','S'].includes(e.key)) setDir(0,1);
    else if (['ArrowLeft','a','A'].includes(e.key)) setDir(-1,0);
    else if (['ArrowRight','d','D'].includes(e.key)) setDir(1,0);
    else if (e.key==='p' || e.key==='P' || e.key===' ' || e.key==='Escape') togglePause();
  });

  function bindDpad(id, nx, ny){
    const el = document.getElementById(id);
    const go = (e)=>{ e.preventDefault(); setDir(nx,ny); el.classList.add('active'); setTimeout(()=>el.classList.remove('active'),120); };
    el.addEventListener('pointerdown', go);
  }
  bindDpad('up',0,-1); bindDpad('down',0,1); bindDpad('left',-1,0); bindDpad('right',1,0);

  // swipe support
  let touchStart = null;
  canvas.addEventListener('pointerdown', e=>{ touchStart = {x:e.clientX,y:e.clientY}; });
  canvas.addEventListener('pointerup', e=>{
    if (!touchStart) return;
    const dx = e.clientX - touchStart.x, dy = e.clientY - touchStart.y;
    if (Math.abs(dx) > Math.abs(dy)){
      if (Math.abs(dx) > 20) setDir(dx>0?1:-1, 0);
    } else {
      if (Math.abs(dy) > 20) setDir(0, dy>0?1:-1);
    }
    touchStart = null;
  });

  function step(){
    dir = nextDir;
    const head = snake[0];
    const nx = head.x + dir.x, ny = head.y + dir.y;

    // wall collision
    if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS){ gameOver('devorga urildingiz'); return; }
    // self collision
    if (snake.some(s => s.x===nx && s.y===ny)){ gameOver("o'z tanangizga urildingiz"); return; }

    snake.unshift({x:nx,y:ny});
    if (nx===food.x && ny===food.y){
      score++;
      const d = DIFF[difficulty];
      tickMs = Math.max(d.min, d.start - score*d.dec);
      placeFood();
    } else {
      snake.pop();
    }
    updateHUD();
  }

  function togglePause(){
    if (state==='playing'){
      state='paused';
      document.getElementById('pauseOverlay').classList.remove('hidden');
    } else if (state==='paused'){
      state='playing';
      lastT = null; // avoid a big dt jump after resuming
      document.getElementById('pauseOverlay').classList.add('hidden');
    }
  }
  document.getElementById('pauseBtn').addEventListener('click', togglePause);
  document.getElementById('pauseChip').addEventListener('click', togglePause);
  document.getElementById('resumeBtn').addEventListener('click', togglePause);

  function gameOver(reason){
    state='over';
    bestMem = Math.max(bestMem, score);
    updateHUD();
    document.getElementById('dpad').classList.add('hidden');
    document.getElementById('endTitle').textContent = "💀 O'YIN TUGADI";
    document.getElementById('endText').textContent = `Siz ${reason}. Hisobingiz: ${score} ta meva.`;
    document.getElementById('endOverlay').classList.remove('hidden');
  }

  function render(){
    const w = COLS*cellSize, h = ROWS*cellSize;
    ctx.clearRect(0,0,w,h);

    // grid
    ctx.strokeStyle = 'rgba(29,35,48,0.6)';
    ctx.lineWidth = 1;
    for(let i=0;i<=COLS;i++){ ctx.beginPath(); ctx.moveTo(i*cellSize,0); ctx.lineTo(i*cellSize,h); ctx.stroke(); }
    for(let j=0;j<=ROWS;j++){ ctx.beginPath(); ctx.moveTo(0,j*cellSize); ctx.lineTo(w,j*cellSize); ctx.stroke(); }

    // food
    ctx.save();
    ctx.fillStyle = '#F2C94C';
    ctx.shadowColor = '#F2C94C'; ctx.shadowBlur = 12;
    const fcx = food.x*cellSize + cellSize/2, fcy = food.y*cellSize + cellSize/2;
    ctx.beginPath(); ctx.arc(fcx, fcy, cellSize*0.35, 0, Math.PI*2); ctx.fill();
    ctx.restore();

    // snake
    snake.forEach((s,i)=>{
      ctx.fillStyle = i===0 ? '#22C55E' : '#4ADE80';
      const pad = i===0 ? 1 : 2;
      ctx.shadowColor = i===0 ? '#22C55E' : 'transparent';
      ctx.shadowBlur = i===0 ? 10 : 0;
      const rx = s.x*cellSize+pad, ry = s.y*cellSize+pad, rs = cellSize-pad*2;
      roundRect(ctx, rx, ry, rs, rs, 5);
      ctx.fill();
    });
  }

  function roundRect(ctx,x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
  }

  function frame(ts){
    if (lastT===null) lastT = ts;
    const dt = ts - lastT;
    lastT = ts;
    if (state==='playing'){
      acc += dt;
      while (acc >= tickMs){ step(); acc -= tickMs; if(state!=='playing') break; }
    }
    render();
    requestAnimationFrame(frame);
  }

  document.querySelectorAll('#startOverlay .btn[data-diff]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      difficulty = btn.getAttribute('data-diff');
      document.getElementById('startOverlay').classList.add('hidden');
      if (isTouch) document.getElementById('dpad').classList.remove('hidden');
      reset(); state='playing';
    });
  });
  document.getElementById('restartBtn').addEventListener('click', ()=>{
    document.getElementById('endOverlay').classList.add('hidden');
    if (isTouch) document.getElementById('dpad').classList.remove('hidden');
    reset(); state='playing';
  });
  document.getElementById('menuBtn').addEventListener('click', ()=>{
    document.getElementById('endOverlay').classList.add('hidden');
    document.getElementById('dpad').classList.add('hidden');
    state='idle';
    document.getElementById('startOverlay').classList.remove('hidden');
  });

  best = 0;
  reset();
  state='idle';
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
